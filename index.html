<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riot Pet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #f2ede8;
      font-family: 'Space Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
 
    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 18vw, 10rem);
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 1.2rem;
    }
    .wordmark em {
      color: #e8232a;
      font-style: normal;
    }
 
    .description {
      font-size: 0.75rem;
      line-height: 1.9;
      color: #777;
      letter-spacing: 0.04em;
      max-width: 34ch;
      text-align: center;
      margin-bottom: 2.5rem;
    }
 
    .form-row {
      display: flex;
      width: 100%;
      max-width: 400px;
    }
    .form-row input[type="email"] {
      flex: 1;
      background: #1a1a1a;
      border: 2px solid #2e2e2e;
      border-right: none;
      color: #f2ede8;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-row input[type="email"]:focus { border-color: #e8232a; }
    .form-row input::placeholder { color: #444; }
 
    .form-row button {
      background: #e8232a;
      color: #0a0a0a;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      border: 2px solid #e8232a;
      padding: 0.85rem 1.4rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .form-row button:hover { background: #f5d233; border-color: #f5d233; }
    .form-row button:disabled { opacity: 0.5; cursor: default; }
 
    .note {
      margin-top: 0.75rem;
      font-size: 0.6rem;
      color: #3a3a3a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
 
    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
      .form-row input[type="email"] { border-right: 2px solid #2e2e2e; border-bottom: none; }
    }
  </style>
</head>
<body>
 
  <h1 class="wordmark">Riot<em>.</em>Pet</h1>
 
  <p class="description">Bold gear for pets with attitude. Something worth the wait is coming.</p>
 
  <div>
    <div class="form-row">
      <form action="https://formcarry.com/s/kJx_psbYZGf" id="my-formcarry" method="POST" accept-charset="UTF-8" enctype="multipart/form-data"></form>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" aria-label="Email address" />
        <input type="hidden" name="_gotcha"><!-- use this to prevent spam -->
        <button id="btn" onclick="handleSubmit()">Notify Me</button>
      </form>
    </div>
    <p class="note">No spam. Just the signal when we're live.</p>
  </div>
 
  <script>
    function handleSubmit() {
      const input = document.getElementById('email');
      const btn = document.getElementById('btn');
      if (!input.value.trim().includes('@')) {
        input.style.borderColor = '#e8232a';
        input.focus();
        return;
      }
      input.value = '';
      input.placeholder = "You're on the list ✦";
      input.disabled = true;
      btn.textContent = 'Done';
      btn.disabled = true;
    }
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
 
</body>
</html>
